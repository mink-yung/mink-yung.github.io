<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 전용 페이지</title>
    <link rel="stylesheet" href="landing.css">
    <style>
        /* 4-0.html specific styles */
        .admin-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
            background: white;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        
        .back-button {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .back-button:hover {
            background: rgba(0, 0, 0, 0.1);
        }
        
        .back-button img {
            width: 30px;
            height: 30px;
        }
        
        .admin-title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
            flex: 1;
            margin: 0;
        }
        
        .admin-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 30px;
        }
        
        .password-input-container {
            width: 100%;
            max-width: 400px;
        }
        
        .password-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1.1rem;
            text-align: center;
            transition: border-color 0.3s ease;
        }
        
        .password-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .admin-buttons {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        
        .admin-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
        }
        
        .admin-btn-back {
            background: #f0f0f0;
            color: #333;
        }
        
        .admin-btn-back:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }
        
        .admin-btn-ok {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }
        
        .admin-btn-ok:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            
            .admin-title {
                font-size: 1.5rem;
            }
            
            .admin-buttons {
                flex-direction: column;
                width: 100%;
                max-width: 300px;
            }
            
            .admin-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- 상단: 왼쪽 위 버튼1 / 중앙정렬 '관리자 전용 페이지' -->
        <header class="admin-header">
            <button class="back-button" onclick="goBack()">
                <img src="./img/back.png" alt="뒤로가기">
            </button>
            <h1 class="admin-title">관리자 전용 페이지</h1>
            <div style="width: 50px;"></div> <!-- 공간을 균등하게 맞추기 위한 빈 div -->
        </header>
        
        <!-- 중앙: 비밀번호 입력 -->
        <main class="admin-content">
            <div class="password-input-container">
                <input 
                    type="password" 
                    class="password-input" 
                    id="passwordInput"
                    placeholder="비밀번호 입력"
                    onkeypress="handleKeyPress(event)"
                >
            </div>
            
            <!-- 하단: 버튼2 (뒤로가기, 오케이) -->
            <div class="admin-buttons">
                <button class="admin-btn admin-btn-back" onclick="goBack()">
                    뒤로가기
                </button>
                <button class="admin-btn admin-btn-ok" onclick="goToNext()">
                    오케이
                </button>
            </div>
        </main>
    </div>
    
    <script>
        // 뒤로가기 버튼: 이전 페이지로 이동
        function goBack() {
            window.history.back();
        }
        
        // 오케이 버튼: 4-2.html로 이동
        function goToNext() {
            const password = document.getElementById('passwordInput').value;
            
            if (!password) {
                alert('비밀번호를 입력해주세요.');
                return;
            }
            
            // 여기에 비밀번호 검증 로직 추가 필요
            // 현재는 바로 이동하도록 설정
            window.location.href = '4-2.html';
        }
        
        // Enter 키 누르면 오케이 버튼 동작
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                goToNext();
            }
        }
    </script>
</body>
</html>
